<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homies Sprod | Visual Production</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="cursor"></div>

    <nav class="top-nav">
        <div class="nav-logo">
            <div id="logo-3d-canvas"></div>
            <h1>HOMIES.</h1>
        </div>
        <ul class="nav-links">
            <li><a href="#videos">VIDEOS</a></li>
            <li><a href="#fotos">FOTOS</a></li>
            <li><a href="#redes">REDES</a></li>
        </ul>
    </nav>

    <div class="main-wrapper">
        <header class="header">
            <h1>HOMIES SPROD.</h1>
            <p>Edition, VFX, and Urban Aesthetic</p>
        </header>

        <main class="grid-container">
            
            <section id="videos" class="grid-item video-section">
                <h2>Reel Destacado</h2>
                <div class="video-placeholder">
                    <div class="play-icon">▶</div>
                    <span>Placeholder for future video embed</span>
                </div>
            </section>
            
            <section id="fotos" class="grid-item photo-section">
                <h2>Fotografía</h2>
                <div class="photo-placeholder-grid">
                    <div class="photo-box"><img src="foto1.jpg" alt="Photo Placeholder 1"><span>`foto1.jpg`</span></div>
                    <div class="photo-box"><img src="foto2.jpg" alt="Photo Placeholder 2"><span>`foto2.jpg`</span></div>
                    <div class="photo-box"><div class="empty-box">`foto4.jpg`</div></div> 
                </div>
            </section>
            
            <section id="redes" class="grid-item networks-section">
                <h2>¿Armamos algo?</h2>
                <a href="https://www.instagram.com/homies_sprod/" target="_blank" class="btn">VISITAR INSTAGRAM</a>
            </section>

        </main>
    </div>

    <script>
        const cursor = document.querySelector('.cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="logo3d.js"></script>

</body>
</html>
