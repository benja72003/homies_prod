<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homies Sprod | Portafolio Visual</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="cursor"></div>

    <nav class="top-nav">
        <div class="nav-logo">
            <h2>HOMIES.</h2>
        </div>
        <ul class="nav-links">
            <li><a href="#videos">VIDEOS</a></li>
            <li><a href="#fotos">FOTOS</a></li>
            <li><a href="#redes">REDES</a></li>
        </ul>
    </nav>

    <div class="main-wrapper">
        <header class="header">
            <h1>HOMIES SPROD.</h1>
            <p>Edición, VFX y Estética Urbana</p>
        </header>

        <main class="bento-container">
            <div class="bento-item hero">
                <h2>Creando la vibra.</h2>
                <p>Productora audiovisual especializada en videoclips, trap y contenido dinámico.</p>
            </div>

            <div id="videos" class="bento-item reel">
                <span class="tag">Reel Destacado</span>
                <div class="video-container">
                    <iframe 
                        src="https://www.instagram.com/reel/DJdePhkNzbR/embed" 
                        frameborder="0" 
                        scrolling="no" 
                        allowtransparency="true" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="bento-item project">
                <span class="tag">VFX / After Effects</span>
                <div class="placeholder-content">Próximos Proyectos</div>
            </div>

            <div id="fotos" class="bento-item photo">
                <span class="tag">Fotografía</span>
                <div class="image-container">
                    <img src="foto1.jpg" alt="Shooting urbano Homies Sprod">
                </div>
            </div>

            <div id="redes" class="bento-item contact">
                <h3>¿Armamos algo?</h3>
                <a href="https://www.instagram.com/homies_sprod/" target="_blank" class="btn">Ir a Instagram</a>
            </div>
        </main>
    </div>

    <script>
        const cursor = document.querySelector('.cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
